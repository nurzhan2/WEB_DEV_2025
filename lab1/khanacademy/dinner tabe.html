<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Challenge: The dinner table</title>
    </head>
    <body>
    
        <h1>Our dinner menu</h1>

        <table>
            <thead>
                <tr>
                    <th>Meal</th>
                    <th>Ingredients</th>
                    <th>Price</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Pizza</td>
                    <td>Cheese, tomato, dough</td>
                    <td>$8</td>
                </tr>

                <tr>
                    <td>Burger</td>
                    <td>Beef, bread, lettuce</td>
                    <td>$6</td>
                </tr>

                <tr>
                    <td>Salad</td>
                    <td>Vegetables, olive oil</td>
                    <td>$5</td>
                </tr>
            </tbody>
        </table>

    </body>
</html>
