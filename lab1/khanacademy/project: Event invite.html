<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Project: Event invite</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
        }

        .card {
            background: white;
            width: 320px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h1 {
            color: darkblue;
        }

        h2 {
            color: darkred;
        }

        ul {
            text-align: left;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 18px;
            background: green;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>
        
    <div class="card">

        <h1>You're invited! 🎉</h1>
        <h2>Birthday Party</h2>
        
        <p><strong>The details:</strong></p>

        <ul>
            <li>Date: February 5</li>
            <li>Time: 18:00</li>
            <li>Place: My house</li>
            <li>Food: Pizza & cake</li>
        </ul>

        <a href="#" class="btn">RSVP</a>

    </div>
        
</body>
</html>
