<!DOCTYPE HTML>
<html>
    <head>
        <title>Challenge: Write a Poem</title>
        <meta charset="utf-8">
    </head>
    <body>
      <h1>Little Light</h1>
      <p>
          Little light inside my chest,
          When I’m tired, you shine the best.
          When it’s dark and I feel small,
          You stand up and make me tall.

          Step by step, I find my way,
          Hope is with me every day.
  

        
      </p>
    </body>
</html>
