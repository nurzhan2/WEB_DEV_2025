<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .price {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>🛒 Products</h1>

{% for p in products %}
<div class="card">
    <h2>{{ p.name }}</h2>
    <p class="price">${{ p.price }}</p>
    <p>{{ p.description }}</p>
    <p>Count: {{ p.count }}</p>
    <p>Category: {{ p.category.name }}</p>
</div>
{% endfor %}

</body>
</html>
