<div class="product-card">

  <img [src]="product.photoURL[0]" style="width:100%; height:180px; object-fit:contain">

  <h3>{{product.name}}</h3>
  <p>{{product.description}}</p>

  ⭐ {{product.rating}}
  <br>
  ❤️ {{product.likes}}

  <br>

  <button (click)="like()">Like</button>
  <button (click)="remove()">Delete</button>
  <a [href]="product.link" target="_blank">More</a>

  <br>

  <a [href]="'https://wa.me/?text=' + product.link" target="_blank">Share on WhatsApp</a>
  <br>
  <a [href]="'https://t.me/share/url?url=' + product.link" target="_blank">Share on Telegram</a>

</div>
